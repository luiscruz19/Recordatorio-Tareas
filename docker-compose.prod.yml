# ════════════════════════════════════════════════════════════════════════════
#  RECORDATORIO TAREAS · PROD (test server) — api de dominio. Build+push + runtime.
#  - `deploy.sh test` lo usa para BUILD + PUSH de la imagen a GHCR.
#  - En el server el mismo archivo sirve para PULL + UP (build: es inerte al hacer pull).
#  Reusa los servicios auth/mailer de FICHADA (desplegados en /opt/test/fichada, misma
#  red externa net-shared). NO se despliegan auth/mailer acá.
#  Ruteo: api → https://recordatorios.sda.ovh (raíz; sin backoffice).
#  La SECRET_KEY y el Basic del .env DEBEN coincidir con los de fichada (mismos usuarios).
# ════════════════════════════════════════════════════════════════════════════
services:
  recordatorios_api:
    build:
      context: ./api
      dockerfile: Dockerfile.production
    image: ghcr.io/luiscruz19/recordatorios-api:${TAG:-TEST}
    container_name: recordatorios_api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=net-shared"
      - "traefik.http.routers.recordatorios_api.rule=Host(`recordatorios.sda.ovh`)"
      - "traefik.http.routers.recordatorios_api.priority=20"
      - "traefik.http.services.recordatorios_api.loadbalancer.server.port=80"
    networks:
      - net-shared

networks:
  net-shared:
    external: true
