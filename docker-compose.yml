# Recordatorio Tareas — usa la infra compartida de /opt/shared (Traefik + mysql_db + net-shared).
# Reusa los servicios core de fichada (fichada_auth / fichada_mailer) en la misma red.
# Requisitos: /opt/shared levantado Y fichada levantado.
#   make up   (crea .env, asegura la base y levanta el api en net-shared)
# Acceso (vía Traefik):
#   - API: http://recordatorios-api.localhost   (login del cliente: POST /auth/login)
name: recordatorios

services:
  recordatorios_api:
    build:
      context: ./api
      dockerfile: Dockerfile.development
    container_name: recordatorios_api
    restart: always
    env_file: ./api/.env
    environment:
      - NODE_ENV=development
      - TZ=America/Argentina/Buenos_Aires
    ports:
      # Acceso directo (sin Traefik) para builds preview-local / LAN de la app.
      - "4010:80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=net-shared"
      - "traefik.http.routers.recordatorios_api.rule=Host(`recordatorios-api.localhost`)"
      - "traefik.http.routers.recordatorios_api.priority=10"
      - "traefik.http.services.recordatorios_api.loadbalancer.server.port=80"
    networks:
      - net-shared

networks:
  net-shared:
    external: true
